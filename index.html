<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="daily.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" id="appIcon">
<link rel="manifest" id="appManifest">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --white:#ffffff;
  --bg:#f9f9f9;
  --border:#efefef;
  --border2:#dbdbdb;
  --ink:#111111;
  --ink2:#262626;
  --ink3:#737373;
  --ink4:#a8a8a8;
  --purple:#7c4dbe;
  --purple-light:#e8dff7;
  --purple-mid:#c4a8ee;
  --purple-dark:#5b34a0;
  --purple-bg:#f5f0ff;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;background:var(--white)}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.header-logo{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.03em}
.header-logo span{color:var(--purple)}
.header-date{font-size:12px;color:var(--ink3);font-weight:400}

/* ── Tab bar ── */
.tab-bar{display:flex;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;position:sticky;top:53px;z-index:19;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:13px 16px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--ink3);white-space:nowrap;flex-shrink:0;transition:all .15s;letter-spacing:.01em}
.tab-btn.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:700}

/* ── Feed body ── */
.feed{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.feed-inner{max-width:600px;margin:0 auto;padding:12px 0 60px}

/* ── Post card (Instagram-style) ── */
.post{background:var(--white);margin-bottom:8px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.post-header{display:flex;align-items:center;gap:10px;padding:12px 16px}
.post-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple-mid),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.post-title{font-size:14px;font-weight:700;color:var(--ink2)}
.post-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.post-body{padding:0 16px 16px}

/* ── Wins checklist ── */
.wins-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.win-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border-radius:12px;cursor:pointer;transition:background .12s;touch-action:manipulation}
.win-row.checked{background:var(--purple-bg)}
.win-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all .2s}
.win-row.checked .win-circle{background:var(--purple);border-color:var(--purple)}
.win-text{font-size:14px;color:var(--ink2);font-weight:500;flex:1}
.win-row.checked .win-text{color:var(--purple)}
.add-win-row{display:flex;gap:8px;margin-top:4px}
.add-win-inp{flex:1;padding:11px 14px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;border:1.5px solid var(--border2);border-radius:12px;background:var(--white);color:var(--ink);outline:none}
.add-win-inp:focus{border-color:var(--purple-mid)}
.add-win-inp::placeholder{color:var(--ink4)}
.add-win-btn{padding:11px 16px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation}

/* ── Priority block ── */
.priority-block{background:var(--purple-bg);border-radius:14px;padding:16px;margin-bottom:8px}
.block-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:6px}
.block-prompt{font-size:14px;color:var(--ink3);margin-bottom:10px;line-height:1.5;font-weight:400}
.ta{width:100%;padding:12px 14px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;border:1.5px solid var(--border2);border-radius:12px;background:var(--white);color:var(--ink);outline:none;resize:none;transition:border-color .2s}
.ta:focus{border-color:var(--purple-mid)}
.ta::placeholder{color:var(--ink4)}

/* ── Action rows ── */
.action-rows{display:flex;flex-direction:column;gap:8px}
.action-row{display:flex;align-items:center;gap:10px}
.action-num{width:28px;height:28px;border-radius:50%;background:var(--purple);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.action-inp{flex:1;padding:11px 14px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;border:1.5px solid var(--border2);border-radius:12px;background:var(--bg);color:var(--ink);outline:none;transition:border-color .2s;min-width:0}
.action-inp:focus{border-color:var(--purple-mid);background:var(--white)}
.action-inp::placeholder{color:var(--ink4)}

/* ── Mindset block ── */
.mindset-block{background:var(--bg);border-radius:14px;padding:16px;margin-bottom:10px}
.mindset-prompt{font-size:15px;font-weight:700;color:var(--ink2);margin-bottom:4px}
.mindset-prefix{font-size:13px;color:var(--ink3);margin-bottom:8px}

/* ── Primary button ── */
.primary-btn{width:100%;padding:15px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:14px;cursor:pointer;touch-action:manipulation;margin-top:4px;letter-spacing:.01em}
.primary-btn:active{opacity:.85}
.save-confirm{font-size:13px;color:var(--purple);text-align:center;opacity:0;transition:opacity .4s;margin-top:8px;font-weight:500}

/* ── Relationships tab ── */
.contact-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.contact-card{background:var(--bg);border-radius:14px;border:1.5px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px}
.contact-card.overdue{border-color:#f0a0a0;background:#fff5f5}
.contact-avatar{width:42px;height:42px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:15px;font-weight:700;color:var(--ink2)}
.contact-freq{font-size:12px;color:var(--ink3);margin-top:2px}
.contact-due{font-size:11px;font-weight:600;color:#d04040;margin-top:2px}
.contact-actions{display:flex;gap:6px;flex-shrink:0}
.contact-btn{padding:7px 12px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;border:none;border-radius:8px;cursor:pointer;touch-action:manipulation;background:var(--purple);color:#fff}
.contact-del-btn{background:none;border:1.5px solid var(--border2);color:var(--ink3);padding:7px 10px;font-size:12px;border-radius:8px;cursor:pointer;touch-action:manipulation;font-family:'Plus Jakarta Sans',sans-serif}
.rel-prompts{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.rel-prompt{background:var(--purple-bg);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--purple-dark);font-weight:500;line-height:1.5;font-style:italic}
.kind-types{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kind-type-btn{padding:11px 10px;font-size:12px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;border:1.5px solid var(--border2);border-radius:10px;background:var(--bg);cursor:pointer;touch-action:manipulation;color:var(--ink2);text-align:center;transition:all .15s;line-height:1.3}
.kind-type-btn.kind-sel{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}
.kind-preview{background:var(--purple-bg);border-radius:12px;padding:16px;font-size:14px;color:var(--ink2);line-height:1.7;font-style:italic;margin-bottom:12px;min-height:60px}
.send-options{display:flex;gap:8px}
.send-sms-btn{flex:1;padding:13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation}
.send-email-btn{flex:1;padding:13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--ink2);color:#fff;border:none;border-radius:12px;cursor:pointer;touch-action:manipulation}
.thinking-card{background:linear-gradient(135deg,var(--purple-bg),#f0f7f0);border-radius:14px;border:1.5px solid var(--purple-mid);padding:18px;margin-bottom:10px}

/* ── Emotional tracker ── */
.mood-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;touch-action:manipulation;transition:all .15s}
.mood-btn.mood-sel{border-color:var(--purple);background:var(--purple-bg)}
.mood-emoji{font-size:22px;line-height:1}
.mood-label{font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.03em}
.mood-btn.mood-sel .mood-label{color:var(--purple)}
.energy-dots{display:flex;gap:6px;flex-wrap:wrap}
.e-dot{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border2);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--ink3);transition:all .15s;touch-action:manipulation}
.e-dot.e-dot-sel{background:var(--purple);border-color:var(--purple);color:#fff}

/* ── Workout plan cards ── */
.plans-list{display:flex;flex-direction:column;gap:8px}
.plan-card{background:var(--bg);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color .15s}
.plan-card.plan-open{border-color:var(--purple)}
.plan-card-head{display:flex;align-items:center;gap:12px;padding:14px 16px}
.plan-emoji{font-size:24px;flex-shrink:0}
.plan-title{font-size:15px;font-weight:700;color:var(--ink2)}
.plan-tag{font-size:12px;color:var(--ink3);margin-top:2px}
.plan-chevron{font-size:11px;color:var(--ink4);flex-shrink:0}
.plan-body{padding:0 16px 12px;font-size:13px;color:var(--ink2);line-height:1.8;white-space:pre-wrap;font-family:monospace;background:var(--white);border-top:1px solid var(--border)}
.plan-use-btn{display:block;width:calc(100% - 32px);margin:0 16px 14px;padding:12px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:10px;cursor:pointer;touch-action:manipulation}

/* ── Exercise tab ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.day-pill{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg);cursor:pointer;touch-action:manipulation;transition:all .15s}
.day-pill.weights{background:var(--purple-bg);border-color:var(--purple-mid)}
.day-pill.cardio{background:#e8f4ff;border-color:#90c4f0}
.day-pill.stretch{background:#fff0f8;border-color:#f0a8d0}
.day-pill.rest{background:#f0f7f0;border-color:#a8d4a8}
.day-pill.active-day{box-shadow:0 0 0 2px var(--purple)}
.day-name{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}
.day-type{font-size:9px;font-weight:600;color:var(--ink3)}
.day-pill.weights .day-type{color:var(--purple)}
.day-pill.cardio .day-type{color:#2196f3}
.day-pill.stretch .day-type{color:#e91e8c}
.day-pill.rest .day-type{color:#4caf50}
.type-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.type-opt{padding:7px 14px;font-size:12px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;border:1.5px solid var(--border2);border-radius:99px;background:var(--bg);cursor:pointer;touch-action:manipulation;color:var(--ink3);transition:all .15s}
.type-opt.sel-weights{background:var(--purple-bg);border-color:var(--purple);color:var(--purple)}
.type-opt.sel-cardio{background:#e8f4ff;border-color:#2196f3;color:#2196f3}
.type-opt.sel-stretch{background:#fff0f8;border-color:#e91e8c;color:#e91e8c}
.type-opt.sel-rest{background:#f0f7f0;border-color:#4caf50;color:#4caf50}

/* ── Nourishment tab ── */
.water-tracker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.glass{width:38px;height:48px;border-radius:6px 6px 10px 10px;border:2px solid var(--border2);background:var(--bg);cursor:pointer;touch-action:manipulation;transition:all .2s;display:flex;align-items:flex-end;overflow:hidden;position:relative}
.glass.filled{border-color:#2196f3}
.glass-fill{width:100%;background:linear-gradient(180deg,#64b5f6,#1976d2);border-radius:0 0 8px 8px;transition:height .3s;height:0}
.glass.filled .glass-fill{height:100%}
.water-count{font-size:13px;font-weight:700;color:#2196f3;margin-top:8px;margin-bottom:4px}
.vitamin-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.vitamin-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:10px;cursor:pointer;touch-action:manipulation;transition:background .12s}
.vitamin-row.checked{background:#f5f0ff}
.vitamin-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all .2s}
.vitamin-row.checked .vitamin-check{background:var(--purple);border-color:var(--purple)}
.vitamin-name{font-size:14px;font-weight:500;color:var(--ink2)}
.vitamin-row.checked .vitamin-name{color:var(--purple)}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.meal-slot{background:var(--bg);border-radius:10px;padding:10px 12px;border:1.5px solid var(--border)}
.meal-slot-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.meal-inp{width:100%;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;border:none;background:transparent;color:var(--ink2);outline:none;padding:0}
.meal-inp::placeholder{color:var(--ink4)}
.meal-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.meal-chip{padding:6px 12px;font-size:12px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;background:var(--purple-bg);border:none;border-radius:99px;color:var(--purple-dark);cursor:pointer;touch-action:manipulation}

/* ── Financial tab ── */
.savings-goal-card{background:#f5f5f5;border-radius:14px;padding:18px;margin-bottom:10px;border:1px solid #e0e0e0}
.savings-progress-bar{height:8px;background:var(--purple-light);border-radius:99px;overflow:hidden;margin:10px 0 4px}
.savings-progress-fill{height:100%;background:var(--purple);border-radius:99px;transition:width .4s}
.savings-amounts{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);font-weight:500}
.desire-card{background:var(--purple-bg);border:1.5px solid var(--purple-mid);border-radius:14px;padding:16px;margin-bottom:10px}
.desire-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--purple);margin-bottom:6px}

/* ── Log entries (past) ── */
.past-label{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);padding:14px 16px 8px}
.log-entry{background:var(--white);border-top:1px solid var(--border);padding:14px 16px}
.log-date{font-size:11px;color:var(--ink4);font-weight:600;margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.log-text{font-size:14px;color:var(--ink2);line-height:1.65}
.log-foot{display:flex;justify-content:flex-end;margin-top:10px}
.cat-add-inp{flex:1;padding:7px 10px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;border:1.5px solid var(--border2);border-radius:8px;background:var(--white);color:var(--ink);outline:none;min-width:0}
.del-btn{background:none;border:none;font-size:12px;color:var(--ink4);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;touch-action:manipulation}

/* ── Empty state ── */
.empty-state{text-align:center;padding:60px 24px}
.empty-icon{font-size:40px;margin-bottom:14px}
.empty-title{font-size:17px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.empty-sub{font-size:14px;color:var(--ink3);line-height:1.6}

/* ── Journal prompts ── */
.prompts-scroll{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.prompt-chip{background:var(--purple-bg);border:none;border-radius:12px;padding:12px 14px;font-size:13px;color:var(--purple-dark);cursor:pointer;touch-action:manipulation;text-align:left;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;line-height:1.4;width:100%}
.prompt-chip:active{background:var(--purple-light)}

/* ── Inspire ── */
.quote-wrap{padding:24px 16px}
.quote-card{background:var(--white);border-radius:20px;padding:32px 24px;text-align:center;border:1px solid var(--border);margin-bottom:20px;box-shadow:0 2px 20px rgba(124,77,190,.08)}
.quote-mark{font-size:40px;color:var(--purple-mid);line-height:1;margin-bottom:12px}
.quote-text{font-size:19px;font-weight:500;color:var(--ink2);line-height:1.6;margin-bottom:18px;letter-spacing:-.01em}
.quote-author{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.new-quote-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:0 auto;padding:13px 28px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:99px;cursor:pointer;touch-action:manipulation}
/* ── Modal ── */
.modal-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:16px}
.modal-footer{display:flex;gap:10px;margin-top:16px}
.modal-cancel{flex:1;padding:13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;background:none;border:1.5px solid var(--border2);border-radius:10px;cursor:pointer;color:var(--ink2)}
.modal-save{flex:2;padding:13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;background:var(--purple);color:#fff;border:none;border-radius:10px;cursor:pointer}
.mi-ta{width:100%;padding:11px 13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;border:1.5px solid var(--border2);border-radius:10px;background:#fff;color:var(--ink);outline:none;resize:vertical;min-height:80px}
.fg{margin-bottom:12px}
.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 18px}
/* ── Relationships tab ── */
.contact-item{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.contact-avatar{width:40px;height:40px;border-radius:50%;background:var(--purple-mid);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:14px;font-weight:700;color:var(--ink2)}
.contact-freq{font-size:11px;color:var(--ink3);margin-top:2px}
.contact-overdue{font-size:10px;font-weight:700;color:#e53935;background:#ffeaea;padding:2px 8px;border-radius:99px;margin-top:4px;display:inline-block}

// ── Sync state ────────────────────────────────────────────────
let _syncTimer = null;
let _syncPending = false;

function setSyncStatus(s){
  const el = document.getElementById('syncDot');
  if(!el) return;
  const MAP = { idle:'#d1d5db', saving:'#f59e0b', saved:'#22c55e', error:'#ef4444', offline:'#9ca3af' };
  const TIPS = { idle:'Ready', saving:'Saving…', saved:'Synced ✓', error:'Sync error — saved locally', offline:'Offline — saved locally' };
  el.style.background = MAP[s] || MAP.idle;
  el.title = TIPS[s] || '';
}

// ── Core DB layer ─────────────────────────────────────────────
const DB_KEY = 'daily_v2';
let DB = {};

function saveDB(key, value){
  DB[key] = value;
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
  if(_sb && USER_ID){ setSyncStatus('saving'); clearTimeout(_syncTimer); _syncTimer = setTimeout(pushToSupabase, 1500); }
}

async function pushToSupabase(){
  if(!_sb || !USER_ID) return;
  _syncPending = false;
  try {
    const { error } = await _sb.from('daily_data')
      .upsert({ user_id: USER_ID, data: DB, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
    if(error) throw error;
    setSyncStatus('saved');
    setTimeout(()=>setSyncStatus('idle'), 3000);
  } catch(e){
    console.warn('Supabase push failed:', e.message);
    setSyncStatus(navigator.onLine ? 'error' : 'offline');
    if(navigator.onLine) setTimeout(()=>pushToSupabase(), 10000);
  }
}

async function pullFromSupabase(){
  if(!_sb || !USER_ID) return false;
  try {
    const { data, error } = await _sb.from('daily_data').select('data').eq('user_id', USER_ID).maybeSingle();
    if(error && error.code !== 'PGRST116') throw error;
    if(data && data.data){
      const localFinancial = DB.financial;
      DB = { ...DB, ...data.data };
      if(localFinancial && Object.keys(localFinancial.dailyEntries||{}).length >
         Object.keys((DB.financial||{}).dailyEntries||{}).length){ DB.financial = localFinancial; }
      localStorage.setItem(DB_KEY, JSON.stringify(DB));
      return true;
    }
  } catch(e){ console.warn('Supabase pull failed:', e.message); }
  return false;
}

window.addEventListener('online',  ()=>{ if(_syncPending) pushToSupabase(); else setSyncStatus('idle'); });
window.addEventListener('offline', ()=>setSyncStatus('offline'));

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function today(){return new Date().toISOString().slice(0,10)}
function todayResetKey(){
  const now=new Date();
  const noon=new Date(now);noon.setHours(12,0,0,0);
  if(now<noon){const yesterday=new Date(now);yesterday.setDate(yesterday.getDate()-1);return yesterday.toISOString().slice(0,10);}
  return now.toISOString().slice(0,10);
}
function fmtFull(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function fmtShort(iso){if(!iso)return'';const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toUpperCase()}
function dayOfYear(){return Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/(864e5));}
function weekOfYear(){return Math.floor(dayOfYear()/7);}

async function loadDB(){
  // 1. Load localStorage instantly
  try{ DB = JSON.parse(localStorage.getItem(DB_KEY)||'{}'); } catch(e){ DB={}; }
  // 2. Pull from Supabase
  if(_sb && USER_ID){
    setSyncStatus('saving');
    const pulled = await pullFromSupabase();
    setSyncStatus(pulled ? 'saved' : 'idle');
    if(pulled) setTimeout(()=>setSyncStatus('idle'), 3000);
  }
  // 3. Apply state
  wins = DB.wins || [...DEFAULT_WINS];
  const t = todayResetKey();
  if(DB.lastDate !== t){ archiveDay(DB.lastDate); resetDailyFields(t); }
  checkedWins = new Set(DB.todayCheckedWins||[]);
  actions = (DB.todayActions||['','','']).concat(['','','']).slice(0,3);
  // 4. Render
  document.getElementById('headerDate').textContent = fmtFull(today());
  renderTab();
}

function archiveDay(dateStr){
  if(!dateStr)return;
  if(DB.nourish){
    if(!DB.nourishHistory)DB.nourishHistory={};
    DB.nourishHistory[dateStr]={glasses:DB.nourish.glasses||0,vitamins:{...DB.nourish.vitamins},meals:{...DB.nourish.meals}};
    const nKeys=Object.keys(DB.nourishHistory).sort().reverse().slice(0,30);
    const trimmed={};nKeys.forEach(k=>trimmed[k]=DB.nourishHistory[k]);
    DB.nourishHistory=trimmed;
  }
  if(DB.todayMood||DB.todayEnergy!=null){
    if(!DB.moodHistory)DB.moodHistory={};
    DB.moodHistory[dateStr]={mood:DB.todayMood,energy:DB.todayEnergy};
    const mKeys=Object.keys(DB.moodHistory).sort().reverse().slice(0,30);
    const mt={};mKeys.forEach(k=>mt[k]=DB.moodHistory[k]);
    DB.moodHistory=mt;
  }
  if(!DB.dailySaved||!DB.dailySaved[dateStr]){
    const winsChecked=Array.from(checkedWins).map(i=>wins[i]).filter(Boolean);
    const actionList=(DB.todayActions||[]).filter(a=>a.trim());
    if(winsChecked.length||actionList.length){
      if(!DB.dailySaved)DB.dailySaved={};
      DB.dailySaved[dateStr]={wins:winsChecked,actions:actionList,autoArchived:true};
    }
  }
}

function resetDailyFields(t){
  DB.lastDate=t;
  checkedWins=new Set(); actions=['','',''];
  DB.todayCheckedWins=[]; DB.todayActions=['','',''];
  DB.todayMood=null; DB.todayEnergy=null;
  if(DB.nourish){
    DB.nourish.glasses=0; DB.nourish.vitaminChecks={};
    DB.nourish.vitaminChecksDate=t;
    DB.nourish.meals={breakfast:'',lunch:'',dinner:'',snack:''};
  }
  // NOTE: DB.financial is NOT reset — money data persists permanently
  localStorage.setItem(DB_KEY,JSON.stringify(DB));
}

function burstConfetti(){
  const colors=['#7c4dbe','#c4a8ee','#e8dff7','#f5f0ff','#5b34a0','#ffffff','#a78bda'];
  const count=60;
  for(let k=0;k<count;k++){
    const el=document.createElement('div');
    const size=Math.random()*8+5;
    const isCircle=Math.random()>.4;
    el.style.cssText=`
      position:fixed;
      left:${Math.random()*100}vw;
      top:-10px;
      width:${size}px;
      height:${isCircle?size:size*0.4}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${isCircle?'50%':'2px'};
      pointer-events:none;
      z-index:9999;
      opacity:1;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    const duration=900+Math.random()*700;
    const drift=(Math.random()-0.5)*120;
    const spin=Math.random()*720-360;
    el.animate([
      {transform:`translateY(0) translateX(0) rotate(0deg)`,opacity:1},
      {transform:`translateY(${60+Math.random()*40}vh) translateX(${drift}px) rotate(${spin}deg)`,opacity:0}
    ],{duration,easing:'cubic-bezier(.25,.46,.45,.94)',fill:'forwards'})
    .onfinish=()=>el.remove();
  }
}

  // Adjust checkedWins indices
  const newChecked=new Set();
  checkedWins.forEach(idx=>{if(idx<i)newChecked.add(idx);else if(idx>i)newChecked.add(idx-1);});
  checkedWins=newChecked;
  saveDB('wins',wins);
  renderWins();
}

function addCustomWin(){
  const inp=document.getElementById('customWinInp');
  const val=(inp.value||'').trim();if(!val)return;
  wins.push(val);saveDB('wins',wins);inp.value='';renderWins();
}

function renderActions(){
  const el=document.getElementById('actionRows');if(!el)return;
  el.innerHTML=actions.map((a,i)=>`
    <div class="action-row">
      <div class="action-num">${i+1}</div>
      <input class="action-inp" type="text" value="${esc(a)}" placeholder="Action ${i+1}…" oninput="actions[${i}]=this.value;saveDB('todayActions',[...actions])">
    </div>`).join('');
}

function saveDaily(){
  const t=today();
  const priority=(document.getElementById('inp_priority').value||'').trim();
  const showup=(document.getElementById('inp_showup').value||'').trim();
  const value=(document.getElementById('inp_value').value||'').trim();
  const actionList=actions.filter(a=>a.trim());
  const winsChecked=Array.from(checkedWins).map(i=>wins[i]);
  if(!priority&&!showup&&!value&&!actionList.length&&!winsChecked.length)return;
  if(!DB.dailySaved)DB.dailySaved={};
  DB.dailySaved[t]={priority,showup,value,actions:actionList,wins:winsChecked,savedAt:Date.now()};
  // Keep only last 30 days
  const keys=Object.keys(DB.dailySaved).sort().reverse().slice(0,30);
  const trimmed={};keys.forEach(k=>trimmed[k]=DB.dailySaved[k]);
  DB.dailySaved=trimmed;
  saveDB('dailySaved',DB.dailySaved);
  if(!DB.dailyLog)DB.dailyLog=[];
  // Upsert today's log entry
  DB.dailyLog=DB.dailyLog.filter(e=>e.date!==t);
  DB.dailyLog.unshift({id:Date.now().toString(),date:t,wins:winsChecked,priority,actions:actionList,showup,value});
  saveDB('dailyLog',DB.dailyLog);
  const conf=document.getElementById('saveConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';},2600);
}

function togglePlan(id){
  expandedPlan=expandedPlan===id?null:id;
  renderExercise();
  setTimeout(()=>{const el=document.querySelector('.plan-open');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},50);
}

function setTodayType(type){
  DB.todayWorkoutType=type;
  saveDB('todayWorkoutType',type);
  // Just update button states in place — don't re-render (would wipe textarea)
  document.querySelectorAll('.today-type-btn').forEach(b=>{
    const t=b.dataset.type;
    b.className='type-opt today-type-btn'+(t===type?' sel-'+t:'');
  });
  // Also update the day pill label immediately
  const todayDay=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
  const TYPE_LABELS={weights:'Wts',cardio:'Crd',rest:'Rest',off:'Off'};
  document.querySelectorAll('.day-pill').forEach((pill,i)=>{
    if(DAYS[i]===todayDay){
      const typeEl=pill.querySelector('.day-type');
      if(typeEl)typeEl.textContent=TYPE_LABELS[type]||type;
      pill.className='day-pill '+type+' active-day';
    }
  });
}

function saveCustomPlan(){
  const title=(document.getElementById('cp_title').value||'').trim();
  if(!title)return;
  const emoji=(document.getElementById('cp_emoji').value||'').trim()||'⚡';
  const tag=(document.getElementById('cp_tag').value||'').trim();
  const content=(document.getElementById('cp_content').value||'').trim();
  if(!DB.customWorkoutPlans)DB.customWorkoutPlans=[];
  DB.customWorkoutPlans.unshift({title,emoji,tag,content});
  saveDB('customWorkoutPlans',DB.customWorkoutPlans);
  const conf=document.getElementById('cpConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';renderExercise();},1200);
}

function deleteCustomPlan(i){
  if(!DB.customWorkoutPlans)return;
  DB.customWorkoutPlans.splice(i,1);
  saveDB('customWorkoutPlans',DB.customWorkoutPlans);
  expandedPlan=null;
  renderExercise();
}

function useCustomPlan(i){
  const plan=(DB.customWorkoutPlans||[])[i];
  if(!plan)return;
  const ta=document.getElementById('ex_log');
  if(ta){ta.value=plan.content;ta.scrollIntoView({behavior:'smooth'});}
}

function usePlan(id){
  const plan=WORKOUT_PLANS.find(p=>p.id===id);
  if(!plan)return;
  const ta=document.getElementById('ex_log');
  if(ta){ta.value=plan.content;ta.scrollIntoView({behavior:'smooth'});}
}

function editDaySchedule(day){
  const schedule=DB.exerciseSchedule||{};
  const current=schedule[day]||'';
  // Show plan options to assign to this day
  const planOpts=WORKOUT_PLANS.map(p=>`
    <button class="type-opt${current===p.id?' sel-weights':''}" onclick="setDayPlan('${day}','${p.id}',this)" style="display:flex;align-items:center;gap:6px;width:100%;margin-bottom:6px;padding:10px 14px;border-radius:10px;font-size:13px">
      <span>${p.emoji}</span><span>${p.title}</span>
    </button>`).join('');
  const typeOpts=WORKOUT_TYPES.map(t=>`<button class="type-opt${current===t?' sel-'+t:''}" onclick="setDayType('${day}','${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('');
  openModal(`<div class="modal-handle"></div>
    <div class="modal-title">${day} — assign workout</div>
    <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px">Quick type</div>
    <div class="type-selector" id="typeSelector" style="margin-bottom:16px">${typeOpts}</div>
    <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px">Assign a plan</div>
    <div id="planSelector">${planOpts}</div>

    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>

    </div>`);

function setDayPlan(day,planId,btn){
  document.querySelectorAll('#planSelector .type-opt').forEach(b=>b.classList.remove('sel-weights'));
  btn.classList.add('sel-weights');
  document.querySelectorAll('#typeSelector .type-opt').forEach(b=>b.className='type-opt');
  // Store temp selection
  btn.dataset.planId=planId;
}

function setDayType(day,type){
  document.querySelectorAll('#typeSelector .type-opt').forEach(b=>{
    b.className='type-opt'+(b.textContent.toLowerCase()===type?' sel-'+type:'');
  });
  document.querySelectorAll('#planSelector .type-opt').forEach(b=>b.classList.remove('sel-weights'));
}

function saveDaySchedule(day){
  if(!DB.exerciseSchedule)DB.exerciseSchedule={};
  const selectedPlan=document.querySelector('#planSelector .sel-weights');
  const selectedType=document.querySelector('#typeSelector .type-opt[class*="sel-"]');
  if(selectedPlan){
    DB.exerciseSchedule[day]=selectedPlan.querySelector('[data-plan-id]')?.dataset.planId||selectedType?.textContent.toLowerCase()||'';
  } else if(selectedType){
    DB.exerciseSchedule[day]=selectedType.textContent.toLowerCase();
  }
  DB.exerciseSchedule[day+'_notes']=(document.getElementById('day_notes').value||'').trim();
  saveDB('exerciseSchedule',DB.exerciseSchedule);closeModal();renderExercise();
}

function saveExercise(){
  const log=(document.getElementById('ex_log').value||'').trim();
  if(!log)return;
  const todayStr=today();
  const todayDay=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];

  // Save the workout log
  if(!DB.exerciseLogs)DB.exerciseLogs={};
  DB.exerciseLogs[todayStr]=log;
  const keys=Object.keys(DB.exerciseLogs).sort().reverse().slice(0,30);
  const trimmed={};keys.forEach(k=>trimmed[k]=DB.exerciseLogs[k]);
  DB.exerciseLogs=trimmed;
  saveDB('exerciseLogs',DB.exerciseLogs);

  // Update weekly schedule for today if a type was selected
  const selectedType=DB.todayWorkoutType||'';
  if(selectedType){
    if(!DB.exerciseSchedule)DB.exerciseSchedule={};
    DB.exerciseSchedule[todayDay]=selectedType;
    saveDB('exerciseSchedule',DB.exerciseSchedule);
  }

  // Add to log history
  if(!DB.exercise)DB.exercise=[];
  const type=selectedType||(DB.exerciseSchedule||{})[todayDay]||'';
  DB.exercise=DB.exercise.filter(e=>e.date!==todayStr);
  DB.exercise.unshift({id:Date.now().toString(),date:todayStr,type,log});
  saveDB('exercise',DB.exercise);

  renderExercise();
  const conf=document.getElementById('exConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';},1400);
}

function deleteExercise(id){
  DB.exercise=(DB.exercise||[]).filter(e=>e.id!==id);
  saveDB('exercise',DB.exercise);renderExercise();
}

function saveRecipe(){
  const name=(document.getElementById('recipe_name').value||'').trim();if(!name)return;

  initNourish();
  DB.nourish.recipes.unshift({name,notes,id:Date.now().toString()});

function deleteRecipe(i){
  initNourish();

}

function addRecipeToMeal(name){
  const slots=['breakfast','lunch','dinner','snack'];
  for(const s of slots){
    const el=document.getElementById('meal_'+s);
    if(el&&!el.value){el.value=name;break;}

}

function toggleGlass(i){
  initNourish();
  const current=DB.nourish.glasses||0;
  DB.nourish.glasses=i<current?i:i+1;
  saveDB('nourish',DB.nourish);renderNourish();
}

function toggleVitamin(name){
  initNourish();
  const wasChecked=DB.nourish.vitaminChecks[name];
  DB.nourish.vitaminChecks[name]=!wasChecked;
  if(!wasChecked)burstConfetti();
  saveDB('nourish',DB.nourish);renderNourish();
}

function addVitamin(){
  const inp=document.getElementById('vitaminInp');
  const val=(inp.value||'').trim();if(!val)return;

}

function removeVitamin(i){

function initFinancial(){
  if(!DB.financial)DB.financial={savings:{goal:0,saved:0},desire:{item:'',cost:0,saved:0},mindset:'',spending:{}};
  if(!DB.financial.savings)DB.financial.savings={goal:0,saved:0};
  if(!DB.financial.desire)DB.financial.desire={item:'',cost:0,saved:0};
  if(!DB.financial.spending)DB.financial.spending={};
}

function isoMonth(dateStr){return dateStr.slice(0,7);}

const SPEND_CATS=['Food','Transport','Shopping','Health','Entertainment','Other'];

function getMonthSpend(cat){
  const m=isoMonth(today());
  const entries=(DB.financial.spending[cat]||[]).filter(e=>e.date.startsWith(m));
  return entries.reduce((s,e)=>s+(parseFloat(e.amt)||0),0);
}

function getTotalMonthSpend(){
  return SPEND_CATS.reduce((s,c)=>s+getMonthSpend(c),0);
}

            <span>Goal: <strong>$${(parseFloat(f.savings.goal)||0).toLocaleString()}</strong></span>
          </div>

function addSpend(cat){
  initFinancial();
  const inp=document.getElementById('spend_'+cat);
  const amt=parseFloat(inp.value)||0;
  if(amt<=0)return;
  if(!DB.financial.spending[cat])DB.financial.spending[cat]=[];
  DB.financial.spending[cat].push({date:today(),amt});
  inp.value='';
  saveDB('financial',DB.financial);
  renderFinancial();
}

function resetMonthSpend(){
  if(!confirm('Reset all spending for this month?'))return;
  initFinancial();
  const m=isoMonth(today());
  SPEND_CATS.forEach(cat=>{
    if(DB.financial.spending[cat])
      DB.financial.spending[cat]=DB.financial.spending[cat].filter(e=>!e.date.startsWith(m));
  });
  saveDB('financial',DB.financial);
  renderFinancial();
}

function updateSavings(){
  initFinancial();
  const goal=parseFloat(document.getElementById('savings_goal').value)||DB.financial.savings.goal;
  const add=parseFloat(document.getElementById('savings_add').value)||0;
  DB.financial.savings.goal=goal;
  DB.financial.savings.saved=Math.max(0,(DB.financial.savings.saved||0)+add);
  saveDB('financial',DB.financial);
  const conf=document.getElementById('savingsConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';renderFinancial();},1200);
}

function updateDesire(){
  initFinancial();
  const item=(document.getElementById('desire_item').value||'').trim();
  const cost=parseFloat(document.getElementById('desire_cost').value)||DB.financial.desire.cost;
  const add=parseFloat(document.getElementById('desire_add').value)||0;
  DB.financial.desire={item,cost,saved:Math.max(0,(DB.financial.desire.saved||0)+add)};
  saveDB('financial',DB.financial);
  const conf=document.getElementById('desireConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';renderFinancial();},1200);
}

function saveMoneyMindset(){
  initFinancial();
  DB.financial.mindset=(document.getElementById('money_mindset').value||'').trim();
  saveDB('financial',DB.financial);
  const conf=document.getElementById('mindsetConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';},1400);
}

// Rotate 6 messages per day (3 sets of 2) based on day of year
function getTodaysMessages(){
  const day=dayOfYear();
  const total=KIND_MESSAGES.length;
  const indices=[];
  for(let i=0;i<6;i++){indices.push((day*6+i*Math.ceil(total/6))%total);}
  return [...new Set(indices)].slice(0,6).map(i=>({...KIND_MESSAGES[i],origIndex:i}));
}

}

function sendKindByIndex(method,index){
  const m=KIND_MESSAGES[index];
  if(!m)return;
  sendMessage(method,m.text);
}

function sendMessage(method,text){
  if(method==='sms'){
    window.location.href='sms:&body='+encodeURIComponent(text);
  } else if(method==='email'){
    window.location.href='mailto:?subject='+encodeURIComponent('Thinking of you')+'&body='+encodeURIComponent(text);
  } else {
    if(navigator.clipboard&&window.isSecureContext){
      navigator.clipboard.writeText(text).then(()=>showCopyToast()).catch(()=>fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }
}

function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:50%;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showCopyToast();}catch(e){alert('Tap and hold to copy:\n\n'+text);}
  document.body.removeChild(ta);
}

function showCopyToast(){
  let t=document.getElementById('copyToast');
  if(!t){
    t=document.createElement('div');t.id='copyToast';
    t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;font-family:Plus Jakarta Sans,sans-serif;pointer-events:none;transition:opacity .3s;opacity:0';
    t.textContent='Copied ✓';document.body.appendChild(t);
  }
  t.style.opacity='1';setTimeout(()=>{t.style.opacity='0';},2200);
}

function renderInspire(){
  if(!currentQuote){
    currentQuote=FALLBACK[dayOfYear()%FALLBACK.length];
  }
  showQuote();
  fetchQuote().then(()=>showQuote()).catch(()=>{});
}

async function fetchQuote(){
  try{
    const r=await fetch('https://api.quotable.io/random?tags=inspirational,motivational,success,life&maxLength=160');
    if(r.ok){const d=await r.json();currentQuote={text:d.content,author:d.author};}
    else throw new Error();
  }catch(e){
    currentQuote=FALLBACK[dayOfYear()%FALLBACK.length];
  }
}

function showQuote(){
  const el=document.getElementById('viewBody');
  if(!el)return;
  const q=currentQuote||FALLBACK[0];
  el.innerHTML=`
    <div class="quote-wrap">
      <div class="quote-card">
        <div class="quote-mark">"</div>
        <div class="quote-text">${esc(q.text)}</div>
        <div class="quote-author">— ${esc(q.author)}</div>
      </div>
      <button class="new-quote-btn" onclick="newQuote()" style="margin-bottom:12px">✦ New quote</button>
      <div style="background:var(--white);border-radius:14px;padding:16px;border:1px solid var(--border);margin-top:4px">
        <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--purple);margin-bottom:10px">Send this quote to someone</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="kind-send-btn send-sms" onclick="sendQuote('sms')" style="flex:1;padding:11px;font-size:13px">💬 Text it</button>
          <button class="kind-send-btn send-email" onclick="sendQuote('email')" style="flex:1;padding:11px;font-size:13px">📧 Email it</button>
          <button class="kind-send-btn send-copy" onclick="sendQuote('copy')" style="flex:1;padding:11px;font-size:13px">📋 Copy</button>
        </div>
      </div>
    </div>`;
}

async function newQuote(){
  // Pick a random fallback immediately while fetching
  const prev=currentQuote;
  let rand;
  do{rand=FALLBACK[Math.floor(Math.random()*FALLBACK.length)];}while(rand.text===prev?.text&&FALLBACK.length>1);
  currentQuote=rand;
  showQuote();
  // Try to fetch fresh one
  try{
    const r=await fetch('https://api.quotable.io/random?tags=inspirational,motivational,success,life&maxLength=160');
    if(r.ok){const d=await r.json();currentQuote={text:d.content,author:d.author};showQuote();}
  }catch(e){}
}

function sendQuote(method){
  const q=currentQuote||FALLBACK[0];
  const text=`"${q.text}" — ${q.author}`;
  sendMessage(method,text);
}

function renderEnvironment(){
  if(!DB.env)DB.env={};
  // Daily reset of checklist if date changed
  if(DB.env.focusDate!==today()){
    DB.env.focusDate=today();
    DB.env.focusArea=null;
    DB.env.checkedItems={};
    DB.env.customTask='';
    saveDB('env',DB.env);
  }
  const e=DB.env;
  const selected=ENV_AREAS.find(a=>a.id===e.focusArea);

  // Category picker grid
  const categoryGrid=ENV_AREAS.map(a=>{
    const isSelected=e.focusArea===a.id;
    return`<div onclick="pickEnvArea('${a.id}')" style="background:${isSelected?'var(--purple-bg)':'var(--bg)'};border:1.5px solid ${isSelected?'var(--purple)':'var(--border)'};border-radius:14px;padding:14px 12px;text-align:center;cursor:pointer;touch-action:manipulation;transition:all .15s">
      <div style="font-size:28px;margin-bottom:6px">${a.emoji}</div>
      <div style="font-size:13px;font-weight:700;color:${isSelected?'var(--purple)':'var(--ink2)'}">${a.label}</div>
    </div>`;
  }).join('');

  // Focus area tasks
  let focusHtml='';
  if(selected){
    const checked=e.checkedItems||{};
    const aChecked=checked[selected.id]||[];
    const done=aChecked.length;
    const total=selected.prompts.length+(e.customTask?1:0);
    const pct=total>0?Math.round((done/total)*100):0;
    const tasksHtml=selected.prompts.map((p,i)=>`
      <div onclick="toggleEnvItem('${selected.id}',${i})" style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;touch-action:manipulation">
        <div style="width:22px;height:22px;border-radius:50%;border:1.5px solid ${aChecked.includes(i)?'var(--purple)':'var(--border2)'};background:${aChecked.includes(i)?'var(--purple)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;margin-top:1px">${aChecked.includes(i)?'✓':''}</div>
        <div style="font-size:14px;color:${aChecked.includes(i)?'var(--ink4)':'var(--ink2)'};line-height:1.5;text-decoration:${aChecked.includes(i)?'line-through':'none'}">${esc(p)}</div>
      </div>`).join('');

    // Custom task row
    const customIdx=99;
    const customDone=aChecked.includes(customIdx);
    const customRow=e.customTask?`
      <div onclick="toggleEnvItem('${selected.id}',99)" style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;touch-action:manipulation">
        <div style="width:22px;height:22px;border-radius:50%;border:1.5px solid ${customDone?'var(--purple)':'var(--border2)'};background:${customDone?'var(--purple)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;margin-top:1px">${customDone?'✓':''}</div>
        <div style="font-size:14px;color:${customDone?'var(--ink4)':'var(--ink2)'};line-height:1.5;text-decoration:${customDone?'line-through':'none'}">${esc(e.customTask)} <span style="font-size:11px;color:var(--purple);font-weight:600">(yours)</span></div>
      </div>`:'';

    focusHtml=`
    <div class="post">
      <div class="post-header"><div class="post-avatar">${selected.emoji}</div>
        <div><div class="post-title">${selected.label} · 15 min focus</div><div class="post-sub">Check off as you go</div></div>
      </div>
      <div class="post-body">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <div style="flex:1;height:6px;background:var(--border2);border-radius:99px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:var(--purple);border-radius:99px;transition:width .3s"></div>
          </div>
          <div style="font-size:12px;font-weight:700;color:var(--ink3)">${done}/${total}</div>
        </div>
        ${tasksHtml}
        ${customRow}
        <div style="margin-top:14px">
          <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px">Add one thing</div>
          <div style="display:flex;gap:8px">
            <input id="env_custom" class="add-win-inp" placeholder="Something specific you want to tackle…" value="${esc(e.customTask||'')}">
            <button class="add-win-btn" onclick="saveEnvCustomTask()">+</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('viewBody').innerHTML=`
    <div class="post">
      <div class="post-header"><div class="post-avatar">🧹</div>
        <div><div class="post-title">15 min · clean &amp; declutter</div><div class="post-sub">Pick one area to focus on today</div></div>
      </div>
      <div class="post-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${categoryGrid}</div>
      </div>
    </div>
    ${focusHtml}
    <div class="post">
      <div class="post-header"><div class="post-avatar">✨</div>
        <div><div class="post-title">Add to your space</div><div class="post-sub">Something you want to bring in</div></div>
      </div>
      <div class="post-body">
        <textarea class="ta" id="env_declutter" placeholder="e.g. A painting for the living room, new lamp, plants…" rows="3"></textarea>
        <button class="primary-btn" style="font-size:13px;padding:11px;margin-top:8px" onclick="saveEnvDeclutter()">Add it</button>
        <div class="save-confirm" id="envDeclutterConfirm" style="margin-top:6px">Added ✦</div>
        ${(DB.envLogs||[]).length?`<div style="margin-top:14px">${(DB.envLogs||[]).slice(0,5).map(l=>`
          <div class="log-entry">
            <div class="log-date">${fmtShort(l.date)}</div>
            <div class="log-text">${esc(l.text)}</div>
            <div class="log-foot"><button class="del-btn" onclick="deleteEnvLog('${l.id}')">Delete</button></div>
          </div>`).join('')}</div>`:''}
      </div>
    </div>`;
}

function pickEnvArea(id){
  if(!DB.env)DB.env={};
  DB.env.focusArea=DB.env.focusArea===id?null:id;
  saveDB('env',DB.env);renderEnvironment();
}

function saveEnvCustomTask(){
  const val=(document.getElementById('env_custom').value||'').trim();
  if(!DB.env)DB.env={};
  DB.env.customTask=val;
  saveDB('env',DB.env);renderEnvironment();
}

function toggleEnvItem(areaId,index){
  if(!DB.env)DB.env={checkedItems:{},completedAreas:{}};
  if(!DB.env.checkedItems[areaId])DB.env.checkedItems[areaId]=[];
  const arr=DB.env.checkedItems[areaId];
  const pos=arr.indexOf(index);
  if(pos>=0)arr.splice(pos,1);else arr.push(index);
  saveDB('env',DB.env);renderEnvironment();
}

function saveEnvJournal(){
  const text=(document.getElementById('env_journal').value||'').trim();if(!text)return;
  if(!DB.relJournal)DB.relJournal=[];
  DB.relJournal.unshift({id:Date.now().toString(),date:today(),text:'[Environment] '+text});
  saveDB('relJournal',DB.relJournal);
  const conf=document.getElementById('envConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';},1400);
  document.getElementById('env_journal').value='';
}

function saveEnvDeclutter(){
  const text=(document.getElementById('env_declutter').value||'').trim();if(!text)return;
  if(!DB.envLogs)DB.envLogs=[];
  DB.envLogs.unshift({id:Date.now().toString(),date:today(),text});
  saveDB('envLogs',DB.envLogs);renderEnvironment();
}

function deleteEnvLog(id){
  DB.envLogs=(DB.envLogs||[]).filter(l=>l.id!==id);
  saveDB('envLogs',DB.envLogs);renderEnvironment();
}

// ═══════════════ NIGHTLY REFLECTION ═══════════════
function renderNight(){
  const t=today();
  const saved=(DB.nightlyReflections||{})[t]||{};
  const entries=Object.keys(DB.nightlyReflections||{}).sort().reverse().slice(0,7);

  let pastHtml='';
  if(entries.length){
    pastHtml=`<div class="past-label">Past reflections</div>`;
    entries.forEach(d=>{
      const e=(DB.nightlyReflections||{})[d]||{};
      if(!e.tomorrow&&!e.gratitude&&!e.release&&!e.tomorrow_setup)return;
      pastHtml+=`<div class="log-entry">
        <div class="log-date">${fmtShort(d)}</div>
        ${e.gratitude?`<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#c47d00;margin-bottom:2px">Grateful for</div><div class="log-text">${esc(e.gratitude)}</div></div>`:''}
        ${e.release?`<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink4);margin-bottom:2px">Released</div><div class="log-text">${esc(e.release)}</div></div>`:''}
        ${e.tomorrow_setup?`<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--purple);margin-bottom:2px">Set up for success</div><div class="log-text">${esc(e.tomorrow_setup)}</div></div>`:''}
        <div class="log-foot"><button class="del-btn" onclick="deleteNightReflection('${d}')">Delete</button></div>
      </div>`;
    });
  }

  document.getElementById('viewBody').innerHTML=`
    <div class="post">
      <div class="post-header"><div class="post-avatar">🌙</div>
        <div><div class="post-title">Nightly reflection</div><div class="post-sub">Wind down with intention</div></div>
      </div>
      <div class="post-body">
        <div style="background:#fff8e7;border-radius:14px;padding:16px;margin-bottom:10px;border-left:3px solid #f5a623">
          <div style="font-size:15px;font-weight:700;color:#c47d00;margin-bottom:4px">What are you grateful for today?</div>
          <div style="font-size:13px;color:var(--ink3);margin-bottom:8px">Three things, big or small…</div>
          <textarea class="ta" id="night_gratitude" placeholder="I'm grateful for…" rows="2">${esc(saved.gratitude||'')}</textarea>
        </div>
        <div style="background:var(--bg);border-radius:14px;padding:16px;margin-bottom:10px">
          <div style="font-size:15px;font-weight:700;color:var(--ink2);margin-bottom:4px">What are you releasing from today?</div>
          <div style="font-size:13px;color:var(--ink3);margin-bottom:8px">Let it go before you sleep…</div>
          <textarea class="ta" id="night_release" placeholder="I'm letting go of…" rows="2">${esc(saved.release||'')}</textarea>
        </div>
        <div style="background:var(--purple-bg);border-radius:14px;padding:16px;margin-bottom:12px;border-left:3px solid var(--purple)">
          <div style="font-size:15px;font-weight:700;color:var(--purple);margin-bottom:4px">How can you set yourself up for success tomorrow?</div>
          <div style="font-size:13px;color:var(--ink3);margin-bottom:8px">One thing to prepare, schedule, or decide tonight…</div>
          <textarea class="ta" id="night_tomorrow" placeholder="Tomorrow I will set myself up by…" rows="3">${esc(saved.tomorrow_setup||'')}</textarea>
        </div>
        <button class="primary-btn" onclick="saveNightReflection()">Save reflection</button>
        <div class="save-confirm" id="nightConfirm" style="margin-top:8px">Rest well ✦</div>
      </div>
    </div>
    ${pastHtml}`;
}

function saveNightReflection(){
  const gratitude=(document.getElementById('night_gratitude').value||'').trim();
  const release=(document.getElementById('night_release').value||'').trim();
  const tomorrow_setup=(document.getElementById('night_tomorrow').value||'').trim();
  if(!gratitude&&!release&&!tomorrow_setup)return;
  if(!DB.nightlyReflections)DB.nightlyReflections={};
  DB.nightlyReflections[today()]={gratitude,release,tomorrow_setup,savedAt:Date.now()};
  // Keep 30 days
  const keys=Object.keys(DB.nightlyReflections).sort().reverse().slice(0,30);
  const trimmed={};keys.forEach(k=>trimmed[k]=DB.nightlyReflections[k]);
  DB.nightlyReflections=trimmed;
  saveDB('nightlyReflections',DB.nightlyReflections);
  const conf=document.getElementById('nightConfirm');
  conf.style.opacity='1';setTimeout(()=>{conf.style.opacity='0';},2000);
}

function deleteNightReflection(dateStr){
  if(DB.nightlyReflections)delete DB.nightlyReflections[dateStr];
  saveDB('nightlyReflections',DB.nightlyReflections);renderNight();
}

// ═══════════════ MODAL ═══════════════
function openModal(html){
  let ov=document.getElementById('modal-overlay');
  if(!ov){
    ov=document.createElement('div');
    ov.id='modal-overlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:flex-end;justify-content:center';
    ov.innerHTML='<div id="modal-box" style="background:#fff;border-radius:18px 18px 0 0;padding:24px 20px 40px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto"></div>';
    ov.addEventListener('click',ev=>{if(ev.target===ov)closeModal()});
    document.body.appendChild(ov);
  }
  document.getElementById('modal-box').innerHTML=html;
  ov.style.display='flex';
}
function closeModal(){
  const ov=document.getElementById('modal-overlay');
  if(ov)ov.style.display='none';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
